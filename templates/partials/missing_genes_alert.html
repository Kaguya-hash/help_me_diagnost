<div class="alert alert--warning" role="alert">
  <span class="alert__icon" aria-hidden="true">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
      <line x1="12" y1="9" x2="12" y2="13"/>
      <line x1="12" y1="17" x2="12.01" y2="17"/>
    </svg>
  </span>
  <div>
    <h3 class="alert__title">Missing genes in sample</h3>
    <p class="alert__text">
      {{ missing_genes|length }} model coefficient{{ 's' if missing_genes|length != 1 else '' }}
      had no matching expression value in your CSV. Predictions used only the genes that were found.
    </p>
    <ul class="gene-tags">
      {% for gene in missing_genes %}
      <li class="gene-tag">{{ gene }}</li>
      {% endfor %}
    </ul>
  </div>
</div>
