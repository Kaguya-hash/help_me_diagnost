{# Usage: {% include 'partials/page_header.html' with context %}
   Requires: page_title, optional page_description #}
<section class="page-header">
  <div class="page-header__inner">
    <h1 class="page-header__title">{{ page_title }}</h1>
    {% if page_description %}
    <p class="page-header__description">{{ page_description }}</p>
    {% endif %}
  </div>
</section>
