<header class="site-header">
  <div class="site-header__inner">
    <a href="{{ url_for('index') }}" class="brand">
      <span class="brand__icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2a7 7 0 0 0-7 7c0 5.25 7 13 7 13s7-7.75 7-13a7 7 0 0 0-7-7z"/>
          <circle cx="12" cy="9" r="2.5"/>
        </svg>
      </span>
      <span class="brand__text">
        <span class="brand__title">Help Me Diagnost</span>
        <span class="brand__subtitle">Expression classifier</span>
      </span>
    </a>

    <nav class="site-nav" aria-label="Main navigation">
      <a href="{{ url_for('index') }}"
         class="site-nav__link{% if request.endpoint == 'index' %} is-active{% endif %}">
        Home
      </a>
      <a href="{{ url_for('test_page') }}"
         class="site-nav__link{% if request.endpoint == 'test_page' %} is-active{% endif %}">
        Test
      </a>
      <a href="{{ url_for('model_page') }}"
         class="site-nav__link{% if request.endpoint == 'model_page' %} is-active{% endif %}">
        Model
      </a>
    </nav>
  </div>
</header>
